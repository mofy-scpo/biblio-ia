# GitHub Pages — site généré côté serveur (Jekyll + remote_theme, AUCUN build local).
title: 📚 Biblio IA
description: Veille et fact-checking IA — chaque affirmation avec sa source et son niveau de confiance.
lang: fr-FR

# Site PROJET GitHub Pages → l'URL a un préfixe /biblio-ia. Indispensable pour que les liens
# (relative_url) pointent au bon endroit et ne renvoient pas de 404.
url: "https://marcoflaherty.github.io"
baseurl: "/biblio-ia"

# Thème documentaire : nav latérale + recherche. Épinglé pour éviter les surprises de build.
remote_theme: just-the-docs/just-the-docs@v0.12.0
plugins:
  - jekyll-remote-theme

# --- Réglages just-the-docs ---
search_enabled: true
heading_anchors: true
color_scheme: light

# Lien "dépôt" en haut à droite
aux_links:
  "Dépôt GitHub":
    - "https://github.com/marcoflaherty/biblio-ia"
aux_links_new_tab: true

# Bouton "corriger cette page sur GitHub" en bas de chaque page (garde le réflexe crayon)
gh_edit_link: true
gh_edit_link_text: "✏️ Corriger cette page sur GitHub"
gh_edit_repository: "https://github.com/marcoflaherty/biblio-ia"
gh_edit_branch: "main"
gh_edit_view_mode: "edit"

footer_content: "Contenu sous CC BY-NC 4.0 (réutilisation créditée, non commerciale) — Biblio IA (prototype)."

# Ne pas publier la tuyauterie interne comme pages du site
exclude:
  - conductor/
  - tools/
  - README.md
  - .gitignore
  - public/
