name: Vérifier les liens

on:
  pull_request:
    paths:
      - "fiches/**"
      - "ressources/**"
      - "tools/check-links.ts"
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Vérifier les liens des contenus
        run: bun tools/check-links.ts
